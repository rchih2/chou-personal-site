<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Engineer | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .parallax { background-attachment: fixed; background-position: center; background-size: cover; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <!-- Hero Section -->
    <section class="h-screen flex items-center justify-center relative parallax" 
             style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=2000&q=80');">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="z-10 text-center px-4">
            <h1 class="text-7xl md:text-9xl font-black mb-6 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-cyan-300">BACKEND</h1>
            <p class="text-2xl text-gray-300 font-light tracking-widest uppercase">Designing Scalable Systems</p>
        </div>
    </section>

    <!-- Content Section -->
    <main class="max-w-6xl mx-auto px-6 py-24">
        
        <!-- About Grid -->
        <div class="grid md:grid-cols-2 gap-12 items-center mb-32">
            <div class="glass-card p-8 rounded-2xl">
                <h2 class="text-4xl font-bold mb-6">關於我</h2>
                <p class="text-gray-400 leading-relaxed text-lg">
                    我熱衷於處理高負載流量下的數據一致性問題。從單體架構到微服務遷移，我致力於將複雜的業務邏輯簡化，並確保系統穩定性與效能。
                </p>
            </div>
            <div class="h-64 bg-gradient-to-br from-blue-900 to-black rounded-2xl border border-blue-500/30 flex items-center justify-center">
                <span class="text-blue-500 font-mono text-xl text-center px-10">System Architecture Design Pattern</span>
            </div>
        </div>

        <!-- Tech Cards -->
        <h2 class="text-4xl font-bold mb-12 text-center">核心技術庫</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-32">
            <!-- Card Repeat -->
            <div class="glass-card p-6 rounded-xl text-center hover:border-blue-500 transition-all">
                <div class="text-4xl mb-4">🚀</div>
                <h3 class="font-bold">Golang/Java</h3>
            </div>
            <div class="glass-card p-6 rounded-xl text-center hover:border-blue-500 transition-all">
                <div class="text-4xl mb-4">💾</div>
                <h3 class="font-bold">PostgreSQL</h3>
            </div>
            <div class="glass-card p-6 rounded-xl text-center hover:border-blue-500 transition-all">
                <div class="text-4xl mb-4">🐳</div>
                <h3 class="font-bold">Docker/K8s</h3>
            </div>
            <div class="glass-card p-6 rounded-xl text-center hover:border-blue-500 transition-all">
                <div class="text-4xl mb-4">⚡</div>
                <h3 class="font-bold">Redis/Cache</h3>
            </div>
        </div>

        <!-- Projects -->
        <h2 class="text-4xl font-bold mb-12">精選專案展示</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="group cursor-pointer">
                <div class="h-80 overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" 
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
                <h3 class="text-xl font-bold">分佈式 API 網關</h3>
            </div>
            <div class="group cursor-pointer">
                <div class="h-80 overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&w=800&q=80" 
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
                <h3 class="text-xl font-bold">即時監控系統</h3>
            </div>
            <div class="group cursor-pointer">
                <div class="h-80 overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&w=800&q=80" 
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
                <h3 class="font-bold">資料庫遷移工具</h3>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-gray-600 border-t border-gray-900">
        <p>&copy; 2024 Backend Engineer Profile. Built with Passion.</p>
    </footer>

</body>
</html>
