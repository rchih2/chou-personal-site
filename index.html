<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | 後端工程師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
        .hover-zoom { transition: transform 0.5s ease; }
        .hover-zoom:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-black text-white">

    <!-- Hero Section -->
    <section class="h-screen flex flex-col justify-center items-center relative overflow-hidden">
        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" 
             class="absolute inset-0 w-full h-full object-cover opacity-40" alt="background">
        
        <div class="z-10 text-center glass p-10 rounded-2xl border border-gray-700">
            <h1 class="text-6xl font-black mb-4 tracking-tighter">BUILDING THE BACKEND</h1>
            <p class="text-xl text-gray-300">Architecture • Performance • Scalability</p>
        </div>
    </section>

    <!-- Project Gallery -->
    <div class="max-w-6xl mx-auto py-20 px-6">
        <h2 class="text-3xl font-bold mb-12 border-b border-gray-800 pb-4">開發專案與架構視覺化</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Project 1 -->
            <div class="group overflow-hidden rounded-xl border border-gray-800">
                <div class="overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1558494949-ef010bbbb319?auto=format&fit=crop&w=800&q=80" 
                         class="hover-zoom w-full h-64 object-cover" alt="Project">
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">微服務架構</h3>
                    <p class="text-gray-400 text-sm">詳細描述系統設計圖與運作邏輯。</p>
                </div>
            </div>

            <!-- Project 2 -->
            <div class="group overflow-hidden rounded-xl border border-gray-800">
                <div class="overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1627398242454-e5619f869e5d?auto=format&fit=crop&w=800&q=80" 
                         class="hover-zoom w-full h-64 object-cover" alt="Project">
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">資料庫調優</h3>
                    <p class="text-gray-400 text-sm">數據分析與 SQL 優化實戰紀錄。</p>
                </div>
            </div>

            <!-- Project 3 -->
            <div class="group overflow-hidden rounded-xl border border-gray-800">
                <div class="overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?auto=format&fit=crop&w=800&q=80" 
                         class="hover-zoom w-full h-64 object-cover" alt="Project">
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">API 負載測試</h3>
                    <p class="text-gray-400 text-sm">使用 JMeter 進行效能壓力測試結果。</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
